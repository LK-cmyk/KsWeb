<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KsWeb - 《迷你世界》ID查看器</title>
    <link rel="stylesheet" href="../static/css/MNIdViewer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 背景图层 -->
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- 主内容区 -->
    <main class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">
                <h2><i class="fas fa-cube"></i> KsWeb</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="../about.html"><i class="fas fa-info-circle"></i> 关于</a></li>
            </ul>
        </nav>

        <!-- 主工具区 -->
        <section class="main-section">
            <div class="section-header">
                <h1><i class="fas fa-search"></i>《迷你世界》ID查看器</h1>
                <p class="subtitle">
                    快速查询《迷你世界》内道具、方块等元素的ID与详细信息
                </p>
                <p class="note">
                    <i class="fas fa-exclamation-triangle"></i> 数据仅供参考，请以游戏内实际情况为准
                </p>
            </div>

            <!-- 控制栏：搜索与分类 -->
            <div class="controls-bar">
                <div class="control-group">
                    <h3><i class="fas fa-filter"></i> 分类筛选</h3>
                    <div class="category-tabs" id="categoryTabs">
                        <!-- 选项卡将在JS中根据 urls 动态生成 -->
                    </div>
                </div>
                <div class="control-group search-group">
                    <h3><i class="fas fa-search"></i> 搜索物品</h3>
                    <div class="search-box-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" placeholder="输入物品名称、ID或描述进行搜索...">
                        <button class="clear-search" id="clearSearchBtn" title="清除搜索">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <p class="search-hint">支持模糊搜索，输入后自动筛选</p>
                    <p class="search-hint">使用前缀：@id:仅搜索ID，@name:仅搜索名称，@desc:仅搜索简介（英文冒号）</p>
                </div>
            </div>

            <!-- ID列表展示区 -->
            <div class="id-list-section">
                <div class="info-bar">
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-tags"></i> 当前分类：</span>
                        <span class="info-value" id="currentCategory">所有分类</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-list-ol"></i> 物品总数：</span>
                        <span class="info-value" id="totalCount">0</span> 项
                    </div>
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-eye"></i> 显示范围：</span>
                        <span class="info-value" id="pageInfo">0 - 0 / 0</span>
                    </div>
                </div>

                <!-- 物品卡片网格 -->
                <div class="items-grid" id="itemsGrid">
                    <!-- 物品卡片由JS动态生成 -->
                </div>

                <!-- 分页控件 -->
                <div class="pagination-container">
                    <div id="pagination" class="pagination">
                        <!-- 分页按钮由JS动态生成 -->
                    </div>
                    <div class="page-size-info">
                        每页显示 <span class="highlight">24</span> 个物品
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <div class="footer-content">
                <p><i class="fas fa-code"></i> Coding your life.</p>
                <p class="copyright" style="color: #00bfff;">tip: 本工具数据来源于网络，与官方无关</p>
            </div>
        </footer>
    </main>

    <script src="../static/script/MNIdViewer.js"></script>
</body>
</html>
