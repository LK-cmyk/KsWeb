<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《迷你世界》ID查看器</title>
    <link rel="stylesheet" href="../static/css/MNIdViewer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 背景图层 -->
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- 主内容区 -->
    <main class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">
                <h2><i class="fas fa-cube"></i> KsWeb</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="../about.html"><i class="fas fa-info-circle"></i> 关于</a></li>
            </ul>
        </nav>

        <!-- 主工具区 -->
        <section class="main-section">
            <div class="section-header">
                <h1><i class="fas fa-search"></i>《迷你世界》ID查看器</h1>
                <p class="subtitle">
                    快速查询《迷你世界》内道具、方块等元素的ID与详细信息
                </p>
                <p class="note">
                    <i class="fas fa-exclamation-triangle"></i> 数据仅供参考，请以游戏内实际情况为准
                </p>
            </div>

            <!-- 控制栏：搜索与分类 -->
            <div class="controls-bar">
                <div class="control-group">
                    <h3><i class="fas fa-filter"></i> 分类筛选</h3>
                    <div class="category-tabs" id="categoryTabs">
                        <div class="tab active" data-category="all">
                            <i class="fas fa-th"></i> 全部
                        </div>
                        <div class="tab" data-category="block">
                            <i class="fas fa-cube"></i> 道具 & 方块
                        </div>
                        <!-- 可根据数据扩展更多分类 -->
                    </div>
                </div>

                <div class="control-group search-group">
                    <h3><i class="fas fa-search"></i> 搜索物品</h3>
                    <div class="search-box-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="searchInput" placeholder="输入物品名称、ID或描述进行搜索...">
                        <button class="clear-search" id="clearSearchBtn" title="清除搜索">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <p class="search-hint">支持模糊搜索，输入后自动筛选</p>
                </div>
            </div>

            <!-- ID列表展示区 -->
            <div class="id-list-section">
                <div class="info-bar">
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-tags"></i> 当前分类：</span>
                        <span class="info-value" id="currentCategory">所有分类</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-list-ol"></i> 物品总数：</span>
                        <span class="info-value" id="totalCount">0</span> 项
                    </div>
                    <div class="info-item">
                        <span class="info-label"><i class="fas fa-eye"></i> 显示范围：</span>
                        <span class="info-value" id="pageInfo">0 - 0 / 0</span>
                    </div>
                </div>

                <!-- 物品卡片网格 -->
                <div class="items-grid" id="itemsGrid">
                    <!-- 静态示例卡片，实际由JS动态生成 -->
                    <div class="item-card" data-category="block">
                        <div class="item-header">
                            <span class="item-id"><i class="fas fa-hashtag"></i> ID: 1001</span>
                            <span class="item-category">方块</span>
                        </div>
                        <h3 class="item-name">石头</h3>
                        <p class="item-desc">一种常见的建筑材料，可用于搭建结构。</p>
                        <div class="item-footer">
                            <button class="copy-btn" data-id="1001">
                                <i class="far fa-copy"></i> 复制ID
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 分页控件 -->
                <div class="pagination-container">
                    <div id="pagination" class="pagination">
                        <!-- 分页按钮由JS动态生成 -->
                    </div>
                    <div class="page-size-info">
                        每页显示 <span class="highlight">24</span> 个物品
                    </div>
                </div>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <div class="footer-content">
                <p><i class="fas fa-code"></i> Coding your life.</p>
                <p class="copyright" style="color: #00bfff;">tip: 本工具数据来源于网络，与官方无关</p>
            </div>
        </footer>
    </main>

    <script>
        const url = "https://ksimg.dpdns.org/?file=data/ItemData.json"; // 数据URL
        const ITEMS_PER_PAGE = 24; // 每页显示24个物品
        
        // 全局状态变量
        let itemsData = []; // 原始数据
        let filteredItems = []; // 当前筛选后的数据
        let currentPage = 1; // 当前页码
        let totalPages = 1; // 总页数
        let currentCategory = 'all'; // 当前分类
        let searchTerm = ''; // 当前搜索词

        async function getData() {
            const apiUrl = url;

            try {
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`网络响应错误: ${response.status}`);
                }

                let itemData = await response.json();
                console.log("获取到的数据:", itemData);
                return itemData;
            } catch (error) {
                console.error('获取数据失败:', error);
                return []; // 返回空数组，避免后续代码出错
            }
        }

        // 动态渲染物品卡片的函数
        function renderItems(itemsArray, page = 1) {
            const itemsGrid = document.getElementById('itemsGrid');
            if (!itemsGrid) {
                console.error('找不到itemsGrid元素');
                return;
            }
            
            // 清空现有内容
            itemsGrid.innerHTML = '';

            // 检查是否有数据
            if (!itemsArray || itemsArray.length === 0) {
                itemsGrid.innerHTML = '<div class="no-data">暂无物品数据</div>';
                // 重置分页信息
                updatePageInfo(0, 1, false);
                return;
            }

            // 计算分页起始和结束位置
            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, itemsArray.length);
            
            // 获取当前页的物品
            const currentPageItems = itemsArray.slice(startIndex, endIndex);

            // 遍历当前页数据数组，为每个物品创建卡片
            for (const item of currentPageItems) {
                const itemCard = document.createElement('div');
                itemCard.className = 'item-card';
                itemCard.setAttribute('data-category', item.Category || 'block');
                itemCard.setAttribute('data-id', item.ID); // 存储ID，便于复制功能使用
                itemCard.title = "点击复制ID"; // 添加悬停提示

                // 填充卡片内部HTML结构
                itemCard.innerHTML = `
                    <div class="item-header">
                        <span class="item-id"><i class="fas fa-hashtag"></i> ID: ${item.id || 'N/A'}</span>
                        <span class="item-category">${/* 如果数据中没有Category字段，您可以留空或使用默认值 */ '方块&道具'}</span>
                    </div>
                    <h3 class="item-name">${item.name || '未命名物品'}</h3>
                    <p class="item-desc">${item.description || '暂无描述'}</p>
                `;

                // 为当前卡片绑定点击复制ID的事件
                itemCard.addEventListener('click', function(event) {
                    // 阻止事件冒泡，避免与可能存在的父元素事件冲突
                    event.stopPropagation();
                    
                    const idToCopy = this.getAttribute('data-id');
                    if (!idToCopy) return;
                    
                    // 使用现代剪贴板API
                    navigator.clipboard.writeText(idToCopy).then(() => {
                        // 复制成功：提供视觉反馈
                        this.style.borderColor = '#10b981'; // 成功绿色
                        this.style.boxShadow = '0 0 0 2px rgba(16, 185, 129, 0.4)';
                        
                        // 短暂改变ID显示文本
                        const idElement = this.querySelector('.item-id');
                        if (idElement) {
                            const originalText = idElement.textContent;
                            idElement.innerHTML = '<i class="fas fa-check"></i> ID已复制!';
                            idElement.style.color = '#10b981';
                            
                            setTimeout(() => {
                                idElement.innerHTML = `<i class="fas fa-hashtag"></i> ID: ${idToCopy}`;
                                idElement.style.color = '';
                                this.style.borderColor = '';
                                this.style.boxShadow = '';
                            }, 1500);
                        }
                        
                    }).catch(err => {
                        console.error('剪贴板API失败: ', err);
                        
                        // 降级方案：使用document.execCommand
                        const textArea = document.createElement('textarea');
                        textArea.value = idToCopy;
                        textArea.style.position = 'fixed';
                        textArea.style.opacity = '0';
                        document.body.appendChild(textArea);
                        textArea.select();
                        
                        try {
                            const success = document.execCommand('copy');
                            document.body.removeChild(textArea);
                            
                            if (success) {
                                // 降级方案成功，同样提供视觉反馈
                                this.style.borderColor = '#10b981';
                                this.style.boxShadow = '0 0 0 2px rgba(16, 185, 129, 0.4)';
                                
                                const idElement = this.querySelector('.item-id');
                                if (idElement) {
                                    const originalText = idElement.textContent;
                                    idElement.innerHTML = '<i class="fas fa-check"></i> ID已复制! (旧方法)';
                                    idElement.style.color = '#10b981';
                                    
                                    setTimeout(() => {
                                        idElement.innerHTML = `<i class="fas fa-hashtag"></i> ID: ${idToCopy}`;
                                        idElement.style.color = '';
                                        this.style.borderColor = '';
                                        this.style.boxShadow = '';
                                    }, 1500);
                                }
                            } else {
                                alert(`复制失败，物品ID为: ${idToCopy}，请手动复制。`);
                            }
                        } catch (err) {
                            console.error('降级复制失败: ', err);
                            alert(`复制失败，物品ID为: ${idToCopy}，请手动复制。`);
                        }
                    });
                });

                itemsGrid.appendChild(itemCard);
            }
            
            // 更新页面信息
            updatePageInfo(itemsArray.length, page, true);
            
            // 更新分页控件
            updatePaginationControls(itemsArray.length, page);
        }

        // 更新页面信息显示
        function updatePageInfo(totalItems, currentPage, hasItems = true) {
            const totalCountSpan = document.getElementById('totalCount');
            const currentCategorySpan = document.getElementById('currentCategory');
            const pageInfoSpan = document.getElementById('pageInfo');
            
            if (totalCountSpan) {
                totalCountSpan.textContent = totalItems;
            }
            
            if (currentCategorySpan) {
                const categoryName = document.querySelector('.tab.active')?.textContent || '所有分类';
                currentCategorySpan.textContent = categoryName;
            }
            
            if (pageInfoSpan) {
                if (!hasItems || totalItems === 0) {
                    pageInfoSpan.textContent = "0 - 0 / 0";
                } else {
                    const startItem = (currentPage - 1) * ITEMS_PER_PAGE + 1;
                    const endItem = Math.min(currentPage * ITEMS_PER_PAGE, totalItems);
                    pageInfoSpan.textContent = `显示 ${startItem} - ${endItem} 项，共 ${totalItems} 项`;
                }
            }
        }

        // 更新分页控件
        function updatePaginationControls(totalItems, currentPage) {
            // 计算总页数
            totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
            
            // 获取分页容器
            const paginationContainer = document.getElementById('pagination');
            if (!paginationContainer) {
                console.error('找不到分页容器元素');
                return;
            }
            
            // 清空现有分页按钮
            paginationContainer.innerHTML = '';
            
            // 如果没有数据，显示无分页状态
            if (totalItems === 0) {
                const noDataMsg = document.createElement('div');
                noDataMsg.className = 'no-data-msg';
                noDataMsg.textContent = '无数据显示';
                paginationContainer.appendChild(noDataMsg);
                return;
            }
            
            // 添加上一页按钮
            const prevButton = document.createElement('button');
            prevButton.id = 'prevPage';
            prevButton.className = 'page-btn';
            prevButton.textContent = '上一页';
            prevButton.disabled = currentPage <= 1;
            prevButton.addEventListener('click', () => {
                if (currentPage > 1) {
                    goToPage(currentPage - 1);
                }
            });
            paginationContainer.appendChild(prevButton);
            
            // 计算要显示的页码
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            // 调整页码范围，确保显示5个页码
            if (endPage - startPage < 4) {
                if (startPage === 1) {
                    endPage = Math.min(startPage + 4, totalPages);
                } else if (endPage === totalPages) {
                    startPage = Math.max(1, endPage - 4);
                }
            }
            
            // 添加页码按钮
            for (let i = startPage; i <= endPage; i++) {
                const pageButton = document.createElement('button');
                pageButton.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageButton.textContent = i;
                pageButton.addEventListener('click', () => goToPage(i));
                paginationContainer.appendChild(pageButton);
            }
            
            // 添加下一页按钮
            const nextButton = document.createElement('button');
            nextButton.id = 'nextPage';
            nextButton.className = 'page-btn';
            nextButton.textContent = '下一页';
            nextButton.disabled = currentPage >= totalPages;
            nextButton.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    goToPage(currentPage + 1);
                }
            });
            paginationContainer.appendChild(nextButton);
            
            // 添加跳转到指定页面的输入框和按钮
            const pageJumpContainer = document.createElement('div');
            pageJumpContainer.className = 'page-jump-container';
            
            const pageInput = document.createElement('input');
            pageInput.type = 'number';
            pageInput.id = 'pageJump';
            pageInput.min = 1;
            pageInput.max = totalPages;
            pageInput.placeholder = '页码';
            pageInput.value = currentPage;
            
            const goButton = document.createElement('button');
            goButton.id = 'goPage';
            goButton.textContent = '跳转';
            goButton.addEventListener('click', () => {
                const pageNum = parseInt(pageInput.value);
                if (pageNum >= 1 && pageNum <= totalPages && pageNum !== currentPage) {
                    goToPage(pageNum);
                }
            });
            
            // 按Enter键跳转
            pageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const pageNum = parseInt(pageInput.value);
                    if (pageNum >= 1 && pageNum <= totalPages && pageNum !== currentPage) {
                        goToPage(pageNum);
                    }
                }
            });
            
            const totalPageSpan = document.createElement('span');
            totalPageSpan.textContent = `/ ${totalPages}`;
            totalPageSpan.style.marginLeft = '5px';
            
            pageJumpContainer.appendChild(pageInput);
            pageJumpContainer.appendChild(totalPageSpan);
            pageJumpContainer.appendChild(goButton);
            
            paginationContainer.appendChild(pageJumpContainer);
        }

        // 跳转到指定页面
        function goToPage(page) {
            if (page < 1 || page > totalPages || page === currentPage) {
                return;
            }
            
            currentPage = page;
            renderItems(filteredItems, currentPage);
            
            // 滚动到顶部，方便查看新页面内容
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 应用分类和搜索筛选
        function applyFilters() {
            // 根据分类筛选
            let result = itemsData;
            
            if (currentCategory !== 'all') {
                result = result.filter(item => (item.Category || 'block') === currentCategory);
            }
            
            // 根据搜索词筛选
            if (searchTerm.trim() !== '') {
                const term = searchTerm.toLowerCase().trim();
                result = result.filter(item => {
                    const name = item.ItemName?.toLowerCase() || '';
                    const id = item.ID?.toString().toLowerCase() || '';
                    const desc = item.Description?.toLowerCase() || '';
                    
                    return name.includes(term) || id.includes(term) || desc.includes(term);
                });
            }
            
            filteredItems = result;
            currentPage = 1; // 重置到第一页
            
            // 立即更新页面信息，确保搜索结果为空时显示正确
            if (filteredItems.length === 0) {
                updatePageInfo(0, 1, false);
                
                // 清空分页控件
                const paginationContainer = document.getElementById('pagination');
                if (paginationContainer) {
                    const noDataMsg = document.createElement('div');
                    noDataMsg.className = 'no-data-msg';
                    noDataMsg.textContent = '无数据显示';
                    paginationContainer.innerHTML = '';
                    paginationContainer.appendChild(noDataMsg);
                }
            }
            
            // 渲染筛选后的结果
            renderItems(filteredItems, currentPage);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('页面加载完成，开始初始化...');
            
            // 检查必需的元素是否存在
            if (!document.getElementById('itemsGrid')) {
                console.error('页面中缺少itemsGrid元素');
                return;
            }
            
            // 显示加载状态
            const itemsGrid = document.getElementById('itemsGrid');
            itemsGrid.innerHTML = '<div class="loading">正在加载数据...</div>';
            
            try {
                // 异步获取数据
                console.log('开始获取数据...');
                itemsData = await getData();
                console.log('数据获取完成，共获取到', itemsData?.length || 0, '条记录');
                
                // 初始化筛选数据
                filteredItems = [...itemsData];
                
                // 绑定分类选项卡事件
                const tabs = document.querySelectorAll('.tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', function() {
                        // 移除所有active类
                        tabs.forEach(t => t.classList.remove('active'));
                        // 给当前点击的选项卡添加active类
                        this.classList.add('active');
                        // 更新当前分类
                        currentCategory = this.getAttribute('data-category');
                        // 应用筛选
                        applyFilters();
                    });
                });
                
                // 绑定搜索功能
                const searchInput = document.getElementById('searchInput');
                if (searchInput) {
                    let searchTimeout;
                    searchInput.addEventListener('input', function() {
                        // 使用防抖，避免频繁触发筛选
                        clearTimeout(searchTimeout);
                        searchTimeout = setTimeout(() => {
                            searchTerm = this.value;
                            applyFilters();
                        }, 300); // 300毫秒后执行筛选
                    });
                    
                    // 添加清空搜索按钮功能
                    const clearSearchBtn = document.getElementById('clearSearchBtn');
                    if (clearSearchBtn) {
                        clearSearchBtn.addEventListener('click', function() {
                            searchInput.value = '';
                            searchTerm = '';
                            applyFilters();
                        });
                    }
                }
                
                // 初始渲染
                applyFilters();
                
            } catch (error) {
                console.error('初始化过程中发生错误:', error);
                itemsGrid.innerHTML = '<div class="error">加载数据失败，请检查网络连接或API配置</div>';
            }
        });
    </script>
</body>
</html>
